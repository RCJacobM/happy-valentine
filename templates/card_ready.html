<!DOCTYPE html>
<html lang="en">
<head>
    <base href="{{.base}}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="static/resource/heart.ico">
    <link rel="stylesheet" href="static/styles/styles.css">
    <link rel="stylesheet" href="static/styles/card.css">
    <title>Create Valentine Card</title>
</head>
<body>
    <main>
        <div id="card-demo">
            <img src="static/resource/cat_heart.gif" alt="" id="gif">
            <p id="message">{{.receipient}}, will you be my Valentine?</p>
            <p id="senderName">-{{.sender}}</p>
            <button id="btn-yes">yes</button>
            <button id="btn-no">no</button>
        </div>
        <p>click the link to copy. Good luck!!</p>
        <h1 id="link" style="text-decoration: underline;">https://{{.host}}{{.base}}card?id={{.id}}</h1>
    </main>
    <script src="static/scripts/card.js"></script>
    <script>
        let link = document.getElementById("link")
        link.addEventListener("click", () => {
            navigator.clipboard.writeText(link.textContent)
            link.textContent = "Copied to clipboard!"
            link.style = "text-decoration: none"
        })
    </script>
</body>
</html>
