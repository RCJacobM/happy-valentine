<!DOCTYPE html>
<html lang="en">
<head>
    <base href="{{.base}}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="static/styles/styles.css">
    <link rel="stylesheet" href="static/styles/card.css">
    <title>Create Valentine Card</title>
</head>
<body>
    <main>
        <div id="card-demo">
            <img src="static/resource/cat_heart.gif" alt="" id="gif">
            <p id="message">Name, will you be my Valentine?</p>
            <p id="senderName">-YourName</p>
            <button id="btn-yes">yes</button>
            <button id="btn-no">no</button>
        </div>

        <h1>https://{{.host}}{{.base}}card?id={{.id}}</h1>
    </main>
    <script src="static/scripts/card.js"></script>
    <script src="static/scripts/demo.js"></script>
</body>
</html>
